<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script src="index.js" type="text/javascript" defer></script>
    <script src="Calculadora.js" type="text/javascript"></script>
    <script src="Pantalla.js" type="text/javascript"></script>
</head>
<body>
    <div class="pantalla">
        <div id="pantallaValorActual"></div>
        <div id="pantallaValorAnterior"></div>
    </div>
    <div class="teclas">
        <div class="fila1 filas">
            <div class="cube division">
                <div class="top"><button value="dividir" class="operador">/</button></div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube potencia">
                <div class="top"><button value="potenciar" class="operador"><ion-icon name="chevron-up-outline"></button></ion-icon></div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube porcentaje">
                <div class="top"><button value="borrarTodo" class="operador" onclick="pantalla.borrarTodo()">C</button></div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube borrar">
                <div class="top" onclick="pantalla.borrar()"><ion-icon name="backspace-outline"></ion-icon></div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
        </div>
        <div class="fila2 filas">
            <div class="cube multiplicar">
                <div class="top"><button value="multiplicar" class="operador"><ion-icon name="close-outline"></button></ion-icon></div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube cubo9">
                <div class="top numero">9</div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube cubo8">
                <div class="top numero">8</div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube cubo7">
                <div class="top numero">7</div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
        </div>
        <div class="fila3 filas">
            <div class="cube restar">
                <div class="top"><button value="restar" class="operador"><ion-icon name="remove-outline"></button></ion-icon></div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube cubo6">
                <div class="top numero">6</div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube cubo5">
                <div class="top numero">5</div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube cubo4">
                <div class="top numero">4</div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
        </div>
        <div class="fila4 filas">
            <div class="cube sumar">
                <div class="top"><button value="sumar" class="operador"><ion-icon name="add-outline"></button></ion-icon></div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube cubo3">
                <div class="top numero">3</div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube cubo2">
                <div class="top numero">2</div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube cubo1">
                <div class="top numero">1</div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
        </div>
        <div class="fila5 filas">
            <div class="cube igual">
                <div class="top"><button value="igual" class="operador"><ion-icon name="reorder-two-outline"></button></ion-icon></div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube punto">
                <div class="top numero">.</div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube color">
                <div class="top"><ion-icon name="color-filter-outline"></ion-icon></div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
            <div class="cube cubo0">
                <div class="top numero">0</div>
                <div>
                    <span style="--i:0"></span>
                    <span style="--i:1"></span>
                    <span style="--i:2"></span>
                    <span style="--i:3"></span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
